<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё мини-приложение</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img id="userAvatar" src="" alt="Аватар">
            </div>
            <h2 id="userName">Загрузка...</h2>
            <p id="userTag">@username</p>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ТОКЕН ВАШЕГО БОТА (НЕ ПУБЛИКУЙТЕ В ОТКРЫТОМ ДОСТУПЕ!)
        const BOT_TOKEN = '8816393273:AAECz8RphPtct272NsmVphMekqsepGlWprk';
        
        // Функция для отправки запросов к Telegram Bot API
        async function sendTelegramRequest(method, data) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('Ошибка:', error);
                return null;
            }
        }

        // Получение данных пользователя
        function getUserData() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                return {
                    id: user.id,
                    firstName: user.first_name || '',
                    lastName: user.last_name || '',
                    username: user.username || '',
                    photoUrl: user.photo_url || null
                };
            }
            return null;
        }

        // Получение фото профиля через Telegram API
        async function getUserProfilePhoto(userId) {
            const result = await sendTelegramRequest('getUserProfilePhotos', {
                user_id: userId,
                limit: 1
            });
            
            if (result && result.ok && result.result.total_count > 0) {
                const photos = result.result.photos;
                if (photos.length > 0 && photos[0].length > 0) {
                    const fileId = photos[0][photos[0].length - 1].file_id;
                    return await getFileUrl(fileId);
                }
            }
            return null;
        }

        // Получение URL файла по file_id
        async function getFileUrl(fileId) {
            const result = await sendTelegramRequest('getFile', {
                file_id: fileId
            });
            
            if (result && result.ok) {
                return `https://api.telegram.org/file/bot${BOT_TOKEN}/${result.result.file_path}`;
            }
            return null;
        }

        // Отправка приветственного сообщения от имени бота
        async function sendWelcomeMessage(chatId, username) {
            const message = username 
                ? `👋 Привет, @${username}! Добро пожаловать!` 
                : '👋 Привет! Добро пожаловать!';
            
            await sendTelegramRequest('sendMessage', {
                chat_id: chatId,
                text: message
            });
        }

        // Основная функция
        async function initApp() {
            const userData = getUserData();
            
            if (!userData) {
                document.getElementById('userName').textContent = 'Ошибка загрузки';
                document.getElementById('userTag').textContent = 'Перезапустите приложение';
                return;
            }

            // Отображаем имя и username
            const fullName = `${userData.firstName} ${userData.lastName}`.trim() || 'Пользователь';
            document.getElementById('userName').textContent = fullName;
            
            const username = userData.username ? `@${userData.username}` : 'Без username';
            document.getElementById('userTag').textContent = username;

            // Получаем и отображаем аватарку
            try {
                const photoUrl = await getUserProfilePhoto(userData.id);
                if (photoUrl) {
                    document.getElementById('userAvatar').src = photoUrl;
                } else {
                    // Если фото нет, генерируем аватар с инициалами
                    const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase() || 'U';
                    document.getElementById('userAvatar').src = 
                        `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&size=200&background=0088cc&color=ffffff`;
                }
            } catch (error) {
                console.error('Ошибка загрузки фото:', error);
            }

            // Отправляем приветствие в чат с ботом
            try {
                // Получаем chat_id из данных
                const chatId = tg.initDataUnsafe.chat?.id || userData.id;
                await sendWelcomeMessage(chatId, userData.username);
                console.log('✅ Приветствие отправлено!');
            } catch (error) {
                console.error('Ошибка отправки приветствия:', error);
            }
        }

        // Запуск приложения
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
