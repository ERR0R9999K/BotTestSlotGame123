<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё мини-приложение</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img id="userAvatar" src="https://via.placeholder.com/200x200/0088cc/ffffff?text=LOADING" alt="Аватар">
            </div>
            <h2 id="userName">Загрузка...</h2>
            <p id="userId">ID: ---</p>
            <p id="userStatus" class="status">Загрузка данных...</p>
            <button id="sendDataBtn" class="telegram-btn">📤 Отправить данные боту</button>
            <button id="closeBtn" class="telegram-btn secondary">✖️ Закрыть</button>
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        
        // Показываем, что приложение готово
        tg.ready();
        
        // Расширяем на всю ширину
        tg.expand();

        // Функция для получения данных пользователя
        function getUserData() {
            try {
                // Проверяем, есть ли данные пользователя
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    const user = tg.initDataUnsafe.user;
                    
                    // Получаем все нужные данные
                    const userId = user.id;
                    const firstName = user.first_name || '';
                    const lastName = user.last_name || '';
                    const username = user.username || '';
                    const languageCode = user.language_code || 'ru';
                    
                    // Формируем полное имя
                    let fullName = `${firstName} ${lastName}`.trim();
                    if (!fullName && username) {
                        fullName = '@' + username;
                    } else if (!fullName) {
                        fullName = 'Пользователь';
                    }
                    
                    // Получаем фото профиля
                    // ВНИМАНИЕ: photo_url может быть недоступен!
                    // Альтернатива - запросить через getUserProfilePhotos
                    let photoUrl = user.photo_url;
                    
                    // Если фото нет, используем заглушку с инициалами
                    if (!photoUrl) {
                        const initials = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase() || 'U';
                        photoUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(firstName + ' ' + lastName)}&size=200&background=0088cc&color=ffffff&font-size=0.5`;
                    }
                    
                    return {
                        userId: userId,
                        fullName: fullName,
                        photoUrl: photoUrl,
                        username: username,
                        languageCode: languageCode,
                        rawData: user
                    };
                } else {
                    // Если данных нет (для тестирования в браузере)
                    console.warn('⚠️ Данные пользователя не найдены. Используем тестовые данные.');
                    return {
                        userId: '123456789',
                        fullName: 'Тестовый Пользователь',
                        photoUrl: 'https://ui-avatars.com/api/?name=Test+User&size=200&background=0088cc&color=ffffff',
                        username: 'test_user',
                        languageCode: 'ru',
                        rawData: null
                    };
                }
            } catch (error) {
                console.error('❌ Ошибка получения данных:', error);
                return {
                    userId: 'Ошибка',
                    fullName: 'Ошибка загрузки',
                    photoUrl: 'https://via.placeholder.com/200x200/ff0000/ffffff?text=ERROR',
                    username: 'error',
                    languageCode: 'ru',
                    rawData: null
                };
            }
        }

        // Отображаем данные пользователя на странице
        function displayUserData() {
            const userData = getUserData();
            
            // Обновляем аватар
            const avatarImg = document.getElementById('userAvatar');
            avatarImg.src = userData.photoUrl;
            avatarImg.alt = userData.fullName;
            
            // Добавляем обработку ошибки загрузки фото
            avatarImg.onerror = function() {
                this.src = 'https://via.placeholder.com/200x200/0088cc/ffffff?text=USER';
            };
            
            // Обновляем имя
            document.getElementById('userName').textContent = userData.fullName;
            
            // Обновляем ID
            document.getElementById('userId').textContent = `🆔 ID: ${userData.userId}`;
            
            // Обновляем статус
            const statusEl = document.getElementById('userStatus');
            if (userData.username) {
                statusEl.textContent = `@${userData.username}`;
                statusEl.style.color = 'var(--tg-theme-hint-color, #888888)';
            } else {
                statusEl.textContent = '✅ Данные загружены';
                statusEl.style.color = '#4CAF50';
            }
            
            // Сохраняем данные в глобальную переменную для отправки
            window.userData = userData;
            
            console.log('✅ Данные пользователя загружены:', userData);
        }

        // Отправляем данные боту
        function sendDataToBot() {
            if (!window.userData) {
                tg.showPopup({
                    title: '⚠️ Ошибка',
                    message: 'Данные пользователя не загружены',
                    buttons: [{ type: 'close' }]
                });
                return;
            }
            
            try {
                // Подготавливаем данные для отправки
                const dataToSend = {
                    user_id: window.userData.userId,
                    name: window.userData.fullName,
                    photo: window.userData.photoUrl,
                    username: window.userData.username,
                    timestamp: new Date().toISOString()
                };
                
                // Отправляем данные через WebApp
                tg.sendData(JSON.stringify(dataToSend));
                
                // Показываем уведомление об успехе
                tg.showPopup({
                    title: '✅ Отправлено!',
                    message: 'Данные успешно отправлены боту.\nПроверьте чат с ботом.',
                    buttons: [{ type: 'close' }]
                });
                
                console.log('📤 Отправлены данные:', dataToSend);
            } catch (error) {
                console.error('❌ Ошибка отправки:', error);
                tg.showPopup({
                    title: '❌ Ошибка',
                    message: 'Не удалось отправить данные',
                    buttons: [{ type: 'close' }]
                });
            }
        }

        // Закрыть мини-приложение
        function closeApp() {
            tg.close();
        }

        // Инициализация приложения
        document.addEventListener('DOMContentLoaded', function() {
            // Загружаем данные пользователя
            displayUserData();
            
            // Назначаем обработчики кнопок
            const sendBtn = document.getElementById('sendDataBtn');
            sendBtn.addEventListener('click', sendDataToBot);
            
            const closeBtn = document.getElementById('closeBtn');
            closeBtn.addEventListener('click', closeApp);
            
            // Обработчик изменения темы Telegram
            tg.onEvent('themeChanged', function() {
                console.log('Тема изменена');
            });
            
            // Обработчик изменения размера окна
            tg.onEvent('viewportChanged', function() {
                console.log('Размер окна изменен');
            });
            
            console.log('🚀 Мини-приложение загружено!');
            console.log('📱 Telegram WebApp версия:', tg.version);
        });
    </script>
</body>
</html>
